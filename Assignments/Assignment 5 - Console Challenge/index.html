<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f9f9f9;
        }
        .calculator-container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        input[type="number"] {
            padding: 10px;
            margin: 10px;
            width: 100px;
            font-size: 1.1em;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            font-size: 1.1em;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        h2 {
            color: #333;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Interactive Web Calculator</h1>
    
    <div class="calculator-container">
        <input type="number" id="number1" placeholder="First Number">
        <input type="number" id="number2" placeholder="Second Number">
        
        <br>
        
        <button onclick="performCalculation('add')">Add (+)</button>
        <button onclick="performCalculation('subtract')">Subtract (-)</button>
        <button onclick="performCalculation('multiply')">Multiply (×)</button>
        <button onclick="performCalculation('divide')">Divide (÷)</button>
        
        <h2>Result: <span id="displayResult">0</span></h2>
    </div>

    <p><small><em>Note: The console commands from your original assignment still work in the background!</em></small></p>

    <script>
        // The core calculator logic
        const calculator = {
            add: function(a, b) {
                return a + b;
            },
            subtract: function(a, b) {
                return a - b;
            },
            multiply: function(a, b) {
                return a * b;
            },
            divide: function(a, b) {
                if (b === 0) {
                    return "Error: Cannot divide by zero!";
                }
                return a / b;
            }
        };

        console.log("Console calculator is ready! Try typing: calculator.add(5, 5)");

        // The logic to make the webpage buttons work
        function performCalculation(operation) {
            const num1 = parseFloat(document.getElementById('number1').value);
            const num2 = parseFloat(document.getElementById('number2').value);
            
            let result;

            if (isNaN(num1) || isNaN(num2)) {
                result = "Please enter two valid numbers!";
            } else {
                if (operation === 'add') {
                    result = calculator.add(num1, num2);
                } else if (operation === 'subtract') {
                    result = calculator.subtract(num1, num2);
                } else if (operation === 'multiply') {
                    result = calculator.multiply(num1, num2);
                } else if (operation === 'divide') {
                    result = calculator.divide(num1, num2);
                }
            }

            document.getElementById('displayResult').innerText = result;
        }
    </script>

</body>
</html>
